services:
  web:
    image: ghcr.io/belfortcontabilidade/renegociacaotributaria:latest
    container_name: renegociacaotributaria
    restart: unless-stopped
    ports:
      - "8080:80"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  watchtower:
    image: containrrr/watchtower
    container_name: renegociacaotributaria-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 30 --label-enable --cleanup --rolling-restart
